<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 東北北海道 J 人 App 最終版</title>
    <style>
        :root { --primary: #ff6b6b; --glass: rgba(255, 255, 255, 0.92); --shadow: 0 8px 32px rgba(0,0,0,0.15); }
        body, html { margin: 0; padding: 0; font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #fdf2f2; scroll-behavior: smooth; }
        
        /* Dashboard */
        #home { padding: 20px; animation: fadeIn 0.5s; }
        .app-header { text-align: center; padding: 30px 0; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .day-box {
            background: white; border-radius: 18px; padding: 18px; text-decoration: none; color: #333;
            box-shadow: var(--shadow); display: flex; flex-direction: column; align-items: center;
            text-align: center; border: 1px solid rgba(255,107,107,0.1); transition: 0.2s;
        }
        .day-box:active { transform: scale(0.92); }
        .day-num { font-weight: bold; color: var(--primary); font-size: 1.3rem; }
        .day-dest { font-size: 0.85rem; color: #444; margin-top: 5px; font-weight: 600; }

        /* Detail Page */
        .page { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; background-size: cover; background-position: center; background-attachment: fixed; }
        .overlay { 
            background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-radius: 24px; padding: 25px; margin-top: 80px; box-shadow: var(--shadow);
            animation: slideUp 0.4s cubic-bezier(0, 0.5, 0.5, 1);
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .back-btn { 
            position: fixed; top: 20px; left: 20px; background: var(--primary); color: white; 
            padding: 12px 24px; border-radius: 30px; text-decoration: none; font-weight: bold; z-index: 1000;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }

        .title { border-left: 6px solid var(--primary); padding-left: 12px; font-weight: bold; font-size: 1.3rem; margin-bottom: 25px; color: #222; }
        .item { display: flex; gap: 15px; margin-bottom: 18px; border-bottom: 1px solid rgba(0,0,0,0.06); padding-bottom: 12px; }
        .item:last-child { border-bottom: none; }
        .time { color: var(--primary); font-weight: bold; min-width: 60px; font-size: 1rem; }
        .desc-box { flex-grow: 1; }
        .act-title { font-weight: bold; font-size: 1rem; color: #222; }
        .meta { font-size: 0.85rem; color: #666; background: rgba(0,0,0,0.03); padding: 8px; border-radius: 8px; margin-top: 5px; }
        .important { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div id="home">
    <div class="app-header">
        <h1>🌸 日本賞櫻 J 人 App</h1>
        <p>2026.03.30 - 04.12 完美手冊</p>
    </div>
    <div class="grid" id="mainGrid"></div>
</div>

<div id="detailPage" class="page">
    <a href="javascript:void(0)" class="back-btn" onclick="showHome()">← 返回總覽</a>
    <div id="detailContent"></div>
</div>

<script>
    const tripData = [

        ]},

            { t: "全天", a: "道央巴士遊", m: "地獄谷、地球岬、洞爺湖、支笏湖" }
        ]},
        { d: "4/10", title: "校園購物", img: "https://images.unsplash.com/photo-1558948211-193498964703?w=1000", items: [
            { t: "08:30", a: "場外市場", m: "海鮮早餐 (建議計程車前往)" },
            { t: "11:00", a: "北海道大學", m: "漫步銀杏大道、北大博物館" },
            { t: "下午", a: "車站大購物", m: "大丸、Stellar Place、Bic Camera" }
        ]},
        { d: "4/11", title: "最後掃貨", img: "https://images.unsplash.com/photo-1555126634-323283e090fa?w=1000", items: [
            { t: "上午", a: "二條市場", m: "海鮮乾貨、最後伴手禮" },
            { t: "下午", a: "札幌工廠", m: "Mont-bell 等戶外品牌採購" },
            { t: "晚上", a: "狸小路", m: "藥妝店最後掃貨、打包行李" }
        ]},
        { d: "4/12", title: "平安歸途", img: "https://images.unsplash.com/photo-1559136555-9303baea8ebd?w=1000", items: [
            { t: "08:30", a: "搭機場快線", m: "札幌 ➔ 新千歲 (￥1,150)" },
            { t: "11:15", a: "IT235 班機", m: "起飛返台，結束 14 天旅程" }
        ]}
    ];

    const grid = document.getElementById('mainGrid');
    tripData.forEach((day, index) => {
        const box = document.createElement('div');
        box.className = 'day-box';
        box.onclick = () => showDetail(index);
        box.innerHTML = `<div class="day-num">${day.d}</div><div class="day-dest">${day.title}</div>`;
        grid.appendChild(box);
    });

    function showDetail(index) {
        const data = tripData[index];
        const page = document.getElementById('detailPage');
        const content = document.getElementById('detailContent');
        page.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url('${data.img}')`;
        
        let htmlItems = data.items.map(i => `
            <div class="item">
                <div class="time">${i.t}</div>
                <div class="desc-box">
                    <div class="act-title">${i.a}</div>
                    <div class="meta">${i.m}</div>
                </div>
            </div>`).join('');

        content.innerHTML = `<div class="overlay"><div class="title">${data.d} ${data.title}</div>${htmlItems}</div>`;
        document.getElementById('home').style.display = 'none';
        page.style.display = 'block';
        window.scrollTo(0,0);
    }

    function showHome() {
        document.getElementById('home').style.display = 'block';
        document.getElementById('detailPage').style.display = 'none';
    }
</script>

</body>
</html>
